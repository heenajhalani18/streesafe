<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreeSafe — Admin</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="mark"></span><span class="display">StreeSafe</span></div>
  <div class="nav-links">
    <a href="index.html">Requester</a>
    <a href="responder.html">Responder</a>
    <a href="admin.html" class="active">Admin</a>
  </div>
</div>

<div class="container">
  <div class="section-title">Operations overview</div>
  <div class="stat-grid">
    <div class="card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total incidents</div>
    </div>
    <div class="card">
      <div class="stat-num" id="statActive" style="color:var(--amber);">0</div>
      <div class="stat-label">Active now</div>
    </div>
    <div class="card">
      <div class="stat-num" id="statResolved" style="color:var(--safe);">0</div>
      <div class="stat-label">Resolved</div>
    </div>
    <div class="card">
      <div class="stat-num" id="statAvg">—</div>
      <div class="stat-label">Avg. resolution (min)</div>
    </div>
    <div class="card">
      <div class="stat-num" id="statSafety" style="color:var(--safe);">—</div>
      <div class="stat-label">Avg. safety score (5)</div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="section-title">Incident log</div>
      <div id="incidentTable"></div>
    </div>
    <div class="card">
      <div class="section-title">Responders online</div>
      <div id="responderList"></div>
    </div>
  </div>

  <div class="card" style="margin-top:20px;">
    <div class="section-title">Recent safety ratings</div>
    <div id="safetyAuditList"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
async function refresh() {
  const [statsRes, incidentsRes, respRes, auditsRes] = await Promise.all([
    fetch(`${API_BASE}/stats`),
    fetch(`${API_BASE}/incidents`),
    fetch(`${API_BASE}/responders`),
    fetch(`${API_BASE}/safety-audits`)
  ]);
  const stats = await statsRes.json();
  const incidents = await incidentsRes.json();
  const responders = await respRes.json();
  const audits = await auditsRes.json();

  const avgSafety = audits.length
    ? (audits.reduce((sum, a) => sum + a.safety_score, 0) / audits.length).toFixed(2)
    : '—';
  document.getElementById('statSafety').textContent = avgSafety;

  const auditList = document.getElementById('safetyAuditList');
  auditList.innerHTML = audits.length
    ? audits.slice(0, 8).map(a => {
        const color = a.safety_score >= 3.5 ? 'status-resolved' : (a.safety_score >= 2 ? 'status-matched' : 'status-requested');
        return `
          <div class="incident-item">
            <div>
              <div style="font-weight:500;">${a.notes || 'No notes'}</div>
              <div style="color:var(--text-dim); font-size:12px;">${a.lat.toFixed(4)}, ${a.lng.toFixed(4)}</div>
            </div>
            <span class="status-pill ${color}">${a.safety_score} / 5</span>
          </div>`;
      }).join('')
    : '<div style="color:var(--text-dim); font-size:13px;">No safety ratings submitted yet.</div>';

  document.getElementById('statTotal').textContent = stats.total_incidents;
  document.getElementById('statActive').textContent = stats.active_incidents;
  document.getElementById('statResolved').textContent = stats.resolved_incidents;
  document.getElementById('statAvg').textContent = stats.avg_resolution_minutes ?? '—';

  const table = document.getElementById('incidentTable');
  if (incidents.length === 0) {
    table.innerHTML = `<div style="color:var(--text-dim); font-size:13px;">No incidents logged yet.</div>`;
  } else {
    table.innerHTML = incidents.map(i => `
      <div class="incident-item">
        <div>
          <div style="font-weight:500;">${i.requester_name}</div>
          <div style="color:var(--text-dim); font-size:12px;">Responder: ${i.responder_name ?? '—'}</div>
        </div>
        <span class="status-pill status-${i.status}">${i.status.replace('_',' ')}</span>
      </div>
    `).join('');
  }

  const rlist = document.getElementById('responderList');
  rlist.innerHTML = responders.map(r => `
    <div class="incident-item">
      <div>
        <div style="font-weight:500;">${r.name}</div>
        <div style="color:var(--text-dim); font-size:12px;">${r.phone}</div>
      </div>
      <span class="status-pill ${r.is_available === 'true' ? 'status-resolved' : 'status-matched'}">
        ${r.is_available === 'true' ? 'available' : 'on incident'}
      </span>
    </div>
  `).join('');
}

setInterval(refresh, 2500);
refresh();
</script>
</body>
</html>
